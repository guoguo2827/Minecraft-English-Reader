<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - Minecraft English Reader</title>
  <link rel="stylesheet" href="/portal.css">
</head>
<body>
  <main class="portal">
    <section class="portal-card">
      <h1>Minecraft English Reader</h1>
      <p>好友小范围英语点读学习</p>
      <form id="loginForm">
        <label>手机号<input name="phone" inputmode="numeric" autocomplete="tel" maxlength="11" pattern="1[3-9][0-9]{9}" required></label>
        <label>密码<input name="password" type="password" autocomplete="current-password" required></label>
        <label class="check-line"><input name="remember" type="checkbox">记住账号密码</label>
        <button type="submit">登录</button>
      </form>
      <p class="portal-link">第一次使用？<a href="/register">用邀请码注册</a></p>
      <p class="portal-link">忘记密码？请联系管理员重置，拿到临时密码后登录并设置新密码。</p>
      <p class="message" id="message"></p>
      <p class="notice">非官方学习工具，与 Mojang、Microsoft、Minecraft 官方无关联。</p>
    </section>
  </main>
  <script>
    const form = document.querySelector("#loginForm");
    const message = document.querySelector("#message");
    const rememberKey = "minecraft-reader-login";

    function loadRememberedLogin() {
      let saved = null;
      try {
        saved = JSON.parse(localStorage.getItem(rememberKey) || "null");
      } catch {
        localStorage.removeItem(rememberKey);
      }
      if (!saved) return;
      form.elements.phone.value = saved.phone || saved.username || "";
      form.elements.password.value = saved.password || "";
      form.elements.remember.checked = true;
    }

    function saveRememberedLogin(body) {
      if (form.elements.remember.checked) {
        localStorage.setItem(rememberKey, JSON.stringify({
          phone: body.phone,
          password: body.password
        }));
      } else {
        localStorage.removeItem(rememberKey);
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      message.textContent = "正在登录...";
      const body = Object.fromEntries(new FormData(form).entries());
      body.phone = String(body.phone || "").replace(/\D/g, "").slice(0, 11);
      const response = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        message.textContent = data.error || "登录失败";
        return;
      }
      saveRememberedLogin(body);
      location.href = data.user?.passwordResetRequired ? "/reset-password" : "/";
    });

    form.elements.phone.addEventListener("input", () => {
      form.elements.phone.value = form.elements.phone.value.replace(/\D/g, "").slice(0, 11);
    });

    loadRememberedLogin();
  </script>
</body>
</html>
