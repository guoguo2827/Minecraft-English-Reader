<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minecraft Core Words Reader</title>
  <style>
    :root {
      --leaf: #2f8f3b;
      --leaf-dark: #1d5e2d;
      --paper: #fff8df;
      --ink: #1b1b16;
      --wood: #6f4725;
      --mint: #dff4d7;
      --sky: #4db7e9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Trebuchet MS", "Microsoft YaHei", sans-serif;
      background:
        repeating-linear-gradient(45deg, rgba(47, 143, 59, .08) 0 12px, transparent 12px 24px),
        linear-gradient(135deg, #ecf9dc, #d4f1dc 45%, #fdf5d1);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 5px solid #3b210f;
      background: linear-gradient(180deg, #845126, #5e3519);
      color: #fff6dc;
      box-shadow: 0 8px 18px rgba(32, 22, 12, .25);
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 42px);
      letter-spacing: 0;
      text-shadow: 2px 3px 0 rgba(0,0,0,.35);
    }

    .subtitle {
      margin: 3px 0 0;
      color: #d8ff9d;
      font-weight: 900;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      font: inherit;
      cursor: pointer;
    }

    .pill {
      min-height: 42px;
      padding: 8px 14px;
      border: 4px solid #f4e68e;
      border-radius: 8px;
      background: #173b27;
      color: #fff8da;
      font-weight: 1000;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,.22);
    }

    main {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 14px;
      height: calc(100vh - 91px);
      padding: 14px;
    }

    .sidebar {
      overflow-y: auto;
      padding-right: 6px;
    }

    .theme-tab {
      width: 100%;
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      margin: 0 0 10px;
      padding: 8px;
      border: 4px solid var(--wood);
      border-radius: 8px;
      background: #fff4c9;
      text-align: left;
      color: #1d2a14;
      box-shadow: inset 0 -4px 0 rgba(108, 75, 34, .18);
    }

    .theme-tab.active {
      background: linear-gradient(180deg, #60cf59, #2f9f43);
      color: #fff;
      border-color: #18541f;
    }

    .tab-num {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255,255,255,.55);
      border-radius: 7px;
      background: #27814a;
      color: white;
      font-size: 24px;
      font-weight: 1000;
    }

    .tab-title {
      min-width: 0;
      font-weight: 1000;
      font-size: 17px;
    }

    .tab-title small {
      display: block;
      margin-top: 2px;
      font-size: 12px;
      color: inherit;
      opacity: .78;
    }

    .workspace {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 12px;
    }

    .study-bar {
      display: grid;
      grid-template-columns: minmax(120px, .55fr) minmax(210px, .8fr) minmax(280px, 1.1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 4px solid var(--wood);
      border-radius: 8px;
      background: rgba(255, 248, 223, .95);
    }

    .study-bar h2 {
      margin: 0;
      color: var(--leaf-dark);
      font-size: clamp(22px, 2.6vw, 34px);
    }

    .study-bar p {
      margin: 2px 0 0;
      font-weight: 900;
      color: #6b4c28;
    }

    .mode-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 6px;
      border: 4px solid #6b4a23;
      border-radius: 8px;
      background: #3d2818;
    }

    .mode-switch button {
      min-height: 40px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: #fff8da;
      font-weight: 1000;
    }

    body[data-study-mode="learn"] [data-mode-button="learn"],
    body[data-study-mode="quiz"] [data-mode-button="quiz"] {
      background: #f5c94d;
      color: #20330f;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,.18);
    }

    .core-reward {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-width: 0;
      padding: 8px;
      border: 4px solid #2a1a0c;
      border-radius: 8px;
      background:
        repeating-linear-gradient(45deg, rgba(255,255,255,.08) 0 8px, transparent 8px 16px),
        linear-gradient(180deg, #213c21, #142715);
      color: #fff8da;
      box-shadow: inset 0 -6px 0 rgba(0,0,0,.24);
    }

    .core-gem {
      display: grid;
      place-items: center;
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,.32);
      border-radius: 8px;
      background: rgba(0,0,0,.2);
      box-shadow: 0 0 18px var(--gem-glow, rgba(84,240,216,.45));
    }

    .core-gem svg {
      width: 38px;
      height: 38px;
      image-rendering: pixelated;
    }

    .core-reward h3 {
      margin: 0;
      font-size: clamp(16px, 1.5vw, 22px);
      line-height: 1;
    }

    .core-reward p {
      margin: 4px 0 0;
      color: #ffe89b;
      font-size: 13px;
    }

    .reward-bar {
      grid-column: 1 / -1;
      height: 14px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,.28);
      border-radius: 8px;
      background: rgba(0,0,0,.28);
    }

    .reward-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #2fae57, #71e6ff, #fff2a8);
      transition: width .45s ease;
    }

    .reward-stats {
      display: grid;
      grid-template-columns: repeat(3, auto);
      gap: 8px;
      font-weight: 1000;
      white-space: nowrap;
      color: #cce8bd;
      font-size: 12px;
    }

    .cards {
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(5, minmax(132px, 1fr));
      gap: 12px;
      align-content: start;
      padding: 2px 4px 12px;
    }

    .word-card {
      display: grid;
      grid-template-rows: minmax(118px, 1fr) auto;
      min-height: 210px;
      padding: 0;
      overflow: hidden;
      border: 4px solid #69451f;
      border-radius: 8px;
      background: #fffdf5;
      box-shadow: inset 0 -5px 0 rgba(101, 64, 25, .14);
    }

    .word-card.speaking {
      outline: 5px solid #f5d94d;
      transform: translateY(-2px);
    }

    .thumb {
      display: grid;
      place-items: center;
      min-height: 126px;
      padding: 14px;
      background: #edf9e8;
      border-bottom: 3px solid #d6c59d;
    }

    .thumb img {
      max-width: 100%;
      max-height: 112px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .word-meta {
      display: grid;
      gap: 4px;
      align-content: center;
      min-height: 70px;
      padding: 10px;
      text-align: center;
      background: #fff8e7;
    }

    .word-meta b {
      font-size: clamp(19px, 1.7vw, 26px);
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .word-meta span {
      color: #16812a;
      font-size: 20px;
      font-weight: 1000;
    }

    body[data-show-cn="false"] .word-meta span {
      visibility: hidden;
    }

    body[data-study-mode="quiz"] .cards {
      filter: blur(5px) grayscale(.18);
      opacity: .45;
      pointer-events: none;
      user-select: none;
    }

    body[data-study-mode="learn"] .quiz {
      filter: blur(5px) grayscale(.18);
      opacity: .45;
      pointer-events: none;
      user-select: none;
    }

    .quiz {
      display: grid;
      grid-template-columns: minmax(150px, .8fr) auto auto minmax(0, 2.6fr);
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 4px solid #315c2b;
      border-radius: 8px;
      background: rgba(238, 252, 218, .94);
    }

    .quiz-word {
      font-size: clamp(26px, 3vw, 44px);
      font-weight: 1000;
      color: #173b27;
      overflow-wrap: anywhere;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .answer {
      min-height: 50px;
      border: 3px solid #6f8c3a;
      border-radius: 8px;
      background: #fffdf5;
      color: #173b27;
      font-size: 20px;
      font-weight: 1000;
    }

    .answer.correct { background: #caffaf; border-color: #269f3c; }
    .answer.wrong { background: #ffd1bd; border-color: #c54e35; }

    .reward-pop {
      animation: reward-pop .55s ease;
    }

    @keyframes reward-pop {
      45% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    .feedback {
      min-height: 24px;
      font-weight: 1000;
      color: #894819;
    }

    .notice {
      margin: 0;
      padding: 4px 10px 8px;
      color: #5c4829;
      font-size: 11px;
      font-weight: 800;
      text-align: center;
    }

    @media (max-width: 1180px) {
      main { grid-template-columns: 210px minmax(0, 1fr); }
      .cards { grid-template-columns: repeat(4, minmax(120px, 1fr)); }
      .quiz { grid-template-columns: minmax(130px, .7fr) auto auto minmax(0, 2.3fr); }
      .answer { font-size: 17px; }
    }

    @media (max-width: 820px) {
      header { grid-template-columns: 1fr; }
      main {
        height: auto;
        grid-template-columns: 1fr;
      }
      .sidebar {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        max-height: 220px;
      }
      .theme-tab { margin: 0; }
      .study-bar { grid-template-columns: 1fr; }
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); max-height: none; }
      .quiz { grid-template-columns: 1fr; }
      .answers { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body data-show-cn="true" data-study-mode="learn">
  <header>
    <div>
      <h1>Minecraft Core Words Reader</h1>
      <p class="subtitle">我的世界核心单词点读学习</p>
    </div>
    <div class="top-actions">
      <button class="pill" id="cnToggle" type="button">隐藏中文</button>
      <button class="pill" id="voiceBtn" type="button">开启语音</button>
      <a class="pill" href="/" style="text-decoration:none">返回主页</a>
    </div>
  </header>

  <main>
    <nav class="sidebar" id="themeTabs" aria-label="核心单词主题"></nav>
    <section class="workspace">
      <section class="study-bar">
        <div>
          <h2 id="themeTitle"></h2>
          <p id="themeSubtitle"></p>
        </div>
        <div class="mode-switch" aria-label="学习模式切换">
          <button type="button" data-mode-button="learn">学习模式</button>
          <button type="button" data-mode-button="quiz">答题模式</button>
        </div>
        <div class="core-reward" id="rewardPanel">
          <div class="core-gem" id="rewardGem" aria-hidden="true"></div>
          <div>
            <h3 id="rewardTitle">Lv1 Core Starter</h3>
            <p id="rewardExp">0 / 80 EXP</p>
          </div>
          <div class="reward-stats">
            <span>今日 <b id="rewardToday">0</b></span>
            <span>连对 <b id="rewardStreak">0</b></span>
            <span>修正 <b id="rewardFixed">0</b></span>
          </div>
          <div class="reward-bar"><div class="reward-fill" id="rewardFill"></div></div>
        </div>
        <button class="pill" id="speakThemeBtn" type="button">读当前词</button>
      </section>
      <section class="cards" id="cards"></section>
      <section class="quiz">
        <div>
          <div class="quiz-word" id="quizWord">word</div>
          <div class="feedback" id="feedback"></div>
        </div>
        <button class="pill" id="speakQuizBtn" type="button">读题</button>
        <button class="pill" id="quizBtn" type="button">下一题</button>
        <button class="pill" id="scrollTopBtn" type="button">回到卡片</button>
        <div class="answers" id="answers"></div>
      </section>
    </section>
  </main>

  <p class="notice">非官方学习工具，与 Mojang、Microsoft、Minecraft 官方无关联。图标素材来自本地学习资料，仅用于小范围英语学习。</p>

  <script src="core-words-data.js"></script>
  <script>
    const TTS_VERSION = "20260710-501008";
    const TTS_VOICE_TYPE = "501008";
    const cnKey = "minecraft-core-reader-show-cn";
    const rewardKey = "minecraft-core-reader-rewards";
    const themes = window.CORE_WORD_THEMES || [];
    let currentThemeIndex = 0;
    let currentItem = null;
    let quizItem = null;
    let audio = null;
    let voiceReady = false;
    let studyMode = "learn";

    const rewardLevels = [
      { level: 1, minExp: 0, title: "Core Starter", gem: "coal" },
      { level: 2, minExp: 80, title: "Block Builder", gem: "iron" },
      { level: 3, minExp: 210, title: "Word Miner", gem: "gold" },
      { level: 4, minExp: 420, title: "Redstone Reader", gem: "redstone" },
      { level: 5, minExp: 700, title: "Lapis Learner", gem: "lapis" },
      { level: 6, minExp: 1080, title: "Emerald Speaker", gem: "emerald" },
      { level: 7, minExp: 1580, title: "Diamond Expert", gem: "diamond" },
      { level: 8, minExp: 2300, title: "Netherite Legend", gem: "netherite" }
    ];
    const gemThemes = {
      coal: { main: "#3f4548", dark: "#171a1c", light: "#9ca5a8", glow: "rgba(190,205,210,.55)" },
      iron: { main: "#c9d0d2", dark: "#6f777b", light: "#f6fbff", glow: "rgba(230,242,247,.62)" },
      gold: { main: "#f5c94d", dark: "#9c6a16", light: "#fff2a8", glow: "rgba(255,220,84,.72)" },
      redstone: { main: "#dc3f38", dark: "#7f1514", light: "#ff9f8f", glow: "rgba(255,78,62,.68)" },
      lapis: { main: "#356fdd", dark: "#183481", light: "#9ecbff", glow: "rgba(77,133,255,.7)" },
      emerald: { main: "#24c76a", dark: "#08733d", light: "#a5ffd0", glow: "rgba(57,239,135,.72)" },
      diamond: { main: "#49dce7", dark: "#138391", light: "#d5ffff", glow: "rgba(84,240,255,.78)" },
      netherite: { main: "#5d5166", dark: "#251d2b", light: "#c6b5d0", glow: "rgba(185,146,220,.65)" }
    };
    let rewardState = loadRewardState();

    const els = {
      themeTabs: document.querySelector("#themeTabs"),
      themeTitle: document.querySelector("#themeTitle"),
      themeSubtitle: document.querySelector("#themeSubtitle"),
      cards: document.querySelector("#cards"),
      cnToggle: document.querySelector("#cnToggle"),
      voiceBtn: document.querySelector("#voiceBtn"),
      speakThemeBtn: document.querySelector("#speakThemeBtn"),
      quizBtn: document.querySelector("#quizBtn"),
      quizWord: document.querySelector("#quizWord"),
      speakQuizBtn: document.querySelector("#speakQuizBtn"),
      scrollTopBtn: document.querySelector("#scrollTopBtn"),
      answers: document.querySelector("#answers"),
      feedback: document.querySelector("#feedback"),
      rewardPanel: document.querySelector("#rewardPanel"),
      rewardGem: document.querySelector("#rewardGem"),
      rewardTitle: document.querySelector("#rewardTitle"),
      rewardExp: document.querySelector("#rewardExp"),
      rewardFill: document.querySelector("#rewardFill"),
      rewardToday: document.querySelector("#rewardToday"),
      rewardStreak: document.querySelector("#rewardStreak"),
      rewardFixed: document.querySelector("#rewardFixed"),
      modeButtons: document.querySelectorAll("[data-mode-button]")
    };

    function makeTtsUrl(text) {
      const params = new URLSearchParams({ text, voice: TTS_VOICE_TYPE, v: TTS_VERSION });
      return `/api/tts?${params.toString()}`;
    }

    function preloadTts(text) {
      fetch(makeTtsUrl(text), { cache: "force-cache" }).catch(() => {});
    }

    function preloadTheme(theme) {
      theme.items.forEach((item, index) => {
        setTimeout(() => preloadTts(item.word), index * 120);
      });
    }

    async function speak(text) {
      if (!text) return;
      if (!audio) {
        audio = new Audio();
        audio.preload = "auto";
      }
      audio.pause();
      audio.currentTime = 0;
      audio.src = makeTtsUrl(text);
      els.voiceBtn.textContent = "语音加载中";
      try {
        await audio.play();
        voiceReady = true;
        els.voiceBtn.textContent = "语音已开启";
      } catch {
        els.voiceBtn.textContent = "请重试";
      }
    }

    function setChineseVisible(visible) {
      document.body.dataset.showCn = visible ? "true" : "false";
      els.cnToggle.textContent = visible ? "隐藏中文" : "显示中文";
      localStorage.setItem(cnKey, visible ? "true" : "false");
    }

    function todayKey() {
      return new Date().toISOString().slice(0, 10);
    }

    function loadRewardState() {
      let state = null;
      try {
        state = JSON.parse(localStorage.getItem(rewardKey) || "null");
      } catch {
        localStorage.removeItem(rewardKey);
      }
      const date = todayKey();
      const base = {
        totalExp: 0,
        todayExp: 0,
        rewardDate: date,
        streakCorrect: 0,
        fixedReviews: 0,
        readKeys: {},
        answeredKeys: {}
      };
      state = { ...base, ...(state || {}) };
      if (state.rewardDate !== date) {
        state.rewardDate = date;
        state.todayExp = 0;
        state.readKeys = {};
      }
      return state;
    }

    function saveRewardState() {
      localStorage.setItem(rewardKey, JSON.stringify(rewardState));
    }

    function getLevelInfo(totalExp) {
      let current = rewardLevels[0];
      for (const level of rewardLevels) {
        if (totalExp >= level.minExp) current = level;
      }
      const next = rewardLevels.find((level) => level.minExp > current.minExp);
      const nextMin = next ? next.minExp : current.minExp + 600;
      return {
        ...current,
        levelExp: Math.max(0, totalExp - current.minExp),
        levelNeed: Math.max(1, nextMin - current.minExp)
      };
    }

    function gemSvg(theme) {
      return `
        <svg viewBox="0 0 64 64" role="img" aria-label="core reward gem">
          <rect x="18" y="4" width="28" height="8" fill="${theme.light}"/>
          <rect x="10" y="12" width="44" height="10" fill="${theme.main}"/>
          <rect x="6" y="22" width="52" height="14" fill="${theme.dark}"/>
          <rect x="14" y="22" width="36" height="14" fill="${theme.main}"/>
          <rect x="18" y="36" width="28" height="14" fill="${theme.main}"/>
          <rect x="24" y="50" width="16" height="8" fill="${theme.dark}"/>
          <rect x="22" y="14" width="12" height="8" fill="${theme.light}"/>
          <rect x="40" y="24" width="8" height="10" fill="${theme.light}"/>
        </svg>
      `;
    }

    function renderReward() {
      const info = getLevelInfo(rewardState.totalExp);
      const theme = gemThemes[info.gem] || gemThemes.coal;
      els.rewardPanel.style.setProperty("--gem-glow", theme.glow);
      els.rewardGem.innerHTML = gemSvg(theme);
      els.rewardTitle.textContent = `Lv${info.level} ${info.title}`;
      els.rewardExp.textContent = `${info.levelExp} / ${info.levelNeed} EXP`;
      els.rewardFill.style.width = `${Math.min(100, Math.round((info.levelExp / info.levelNeed) * 100))}%`;
      els.rewardToday.textContent = rewardState.todayExp || 0;
      els.rewardStreak.textContent = rewardState.streakCorrect || 0;
      els.rewardFixed.textContent = rewardState.fixedReviews || 0;
    }

    function grantReward(exp, streakDelta = 0) {
      if (exp > 0) {
        rewardState.totalExp += exp;
        rewardState.todayExp += exp;
      }
      if (streakDelta) rewardState.streakCorrect += streakDelta;
      saveRewardState();
      renderReward();
      els.rewardPanel.classList.remove("reward-pop");
      void els.rewardPanel.offsetWidth;
      els.rewardPanel.classList.add("reward-pop");
    }

    function setStudyMode(mode) {
      studyMode = mode === "quiz" ? "quiz" : "learn";
      document.body.dataset.studyMode = studyMode;
      if (studyMode === "quiz") {
        setTimeout(() => document.querySelector(".quiz")?.scrollIntoView({ behavior: "smooth", block: "start" }), 40);
      }
    }

    function shuffle(array) {
      return array.map((value) => ({ value, sort: Math.random() })).sort((a, b) => a.sort - b.sort).map(({ value }) => value);
    }

    function renderTabs() {
      els.themeTabs.innerHTML = themes.map((theme, index) => `
        <button class="theme-tab ${index === currentThemeIndex ? "active" : ""}" type="button" data-theme="${index}">
          <span class="tab-num">${String(index + 1).padStart(2, "0")}</span>
          <span class="tab-title">${theme.title}<small>${theme.items.length} words</small></span>
        </button>
      `).join("");
    }

    function renderCards() {
      const theme = themes[currentThemeIndex];
      els.cards.innerHTML = theme.items.map((item, index) => `
        <button class="word-card" type="button" data-index="${index}">
          <span class="thumb"><img src="${item.image}" alt=""></span>
          <span class="word-meta"><b>${item.word}</b><span>${item.cn}</span></span>
        </button>
      `).join("");
      els.cards.querySelectorAll(".word-card").forEach((card) => {
        card.addEventListener("click", () => {
          const item = theme.items[Number(card.dataset.index)];
          currentItem = item;
          document.querySelectorAll(".word-card.speaking").forEach((node) => node.classList.remove("speaking"));
          card.classList.add("speaking");
          setTimeout(() => card.classList.remove("speaking"), 500);
          const key = `${todayKey()}:${theme.id}:${item.word}`;
          if (!rewardState.readKeys[key]) {
            rewardState.readKeys[key] = true;
            grantReward(1, 0);
          }
          speak(item.word);
        });
      });
    }

    function makeQuiz() {
      const theme = themes[currentThemeIndex];
      quizItem = theme.items[Math.floor(Math.random() * theme.items.length)] || theme.items[0];
      currentItem = quizItem;
      const wrong = shuffle(theme.items.filter((item) => item.cn !== quizItem.cn)).slice(0, 3);
      const options = shuffle([quizItem, ...wrong]).map((item) => item.cn);
      els.quizWord.textContent = quizItem.word;
      els.feedback.textContent = "";
      els.answers.innerHTML = options.map((cn) => `<button class="answer" type="button" data-cn="${cn}">${cn}</button>`).join("");
      els.answers.querySelectorAll(".answer").forEach((button) => {
        button.addEventListener("click", () => {
          const ok = button.dataset.cn === quizItem.cn;
          els.answers.querySelectorAll(".answer").forEach((node) => {
            node.disabled = true;
            if (node.dataset.cn === quizItem.cn) node.classList.add("correct");
          });
          if (!ok) button.classList.add("wrong");
          els.feedback.textContent = ok ? "答对了！" : `正确答案：${quizItem.cn}`;
          if (ok) {
            rewardState.streakCorrect += 1;
            const answeredKey = `${theme.id}:${quizItem.word}`;
            const firstCorrect = !rewardState.answeredKeys[answeredKey];
            rewardState.answeredKeys[answeredKey] = true;
            const streakBonus = rewardState.streakCorrect === 3 ? 3 : rewardState.streakCorrect === 5 ? 5 : rewardState.streakCorrect % 10 === 0 ? 8 : 0;
            grantReward((firstCorrect ? 5 : 1) + streakBonus, 0);
          } else {
            rewardState.streakCorrect = 0;
            saveRewardState();
            renderReward();
          }
          speak(quizItem.word);
        }, { once: true });
      });
      preloadTts(quizItem.word);
    }

    function setTheme(index) {
      currentThemeIndex = index;
      const theme = themes[index];
      currentItem = theme.items[0];
      els.themeTitle.textContent = theme.title;
      els.themeSubtitle.textContent = `${theme.items.length} words`;
      renderTabs();
      renderCards();
      makeQuiz();
      preloadTheme(theme);
    }

    els.themeTabs.addEventListener("click", (event) => {
      const button = event.target.closest("[data-theme]");
      if (button) setTheme(Number(button.dataset.theme));
    });
    els.cnToggle.addEventListener("click", () => setChineseVisible(document.body.dataset.showCn === "false"));
    els.voiceBtn.addEventListener("click", () => speak(currentItem?.word || themes[0]?.items[0]?.word));
    els.speakThemeBtn.addEventListener("click", () => speak(currentItem?.word));
    els.quizBtn.addEventListener("click", makeQuiz);
    els.speakQuizBtn.addEventListener("click", () => speak(quizItem?.word));
    els.scrollTopBtn.addEventListener("click", () => els.cards.scrollTo({ top: 0, behavior: "smooth" }));
    els.modeButtons.forEach((button) => {
      button.addEventListener("click", () => setStudyMode(button.dataset.modeButton));
    });

    setChineseVisible(localStorage.getItem(cnKey) !== "false");
    renderReward();
    setStudyMode("learn");
    setTheme(0);
  </script>
</body>
</html>
