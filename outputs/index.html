<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minecraft English Reader</title>
  <style>
    :root {
      --bg: #dff4cf;
      --ink: #182317;
      --leaf: #2f7d32;
      --leaf-dark: #1f5f2a;
      --wood: #8a5528;
      --gold: #f5c94d;
      --paper: #fff9e8;
      --line: #7b5b2f;
      --blue: #2d8ac8;
      --red: #c64238;
      font-family: "Trebuchet MS", "Microsoft YaHei", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255,255,255,.65), rgba(255,255,255,0) 230px),
        repeating-linear-gradient(45deg, rgba(80, 143, 66, .14) 0 14px, rgba(80, 143, 66, .05) 14px 28px),
        var(--bg);
    }

    button {
      font: inherit;
      cursor: pointer;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 10px 18px;
      background: linear-gradient(180deg, #3d2818, #7b4b24);
      border-bottom: 5px solid #2c1a0d;
      color: #fff8da;
      box-shadow: 0 8px 20px rgba(28, 21, 10, .25);
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(22px, 2.6vw, 34px);
      letter-spacing: 0;
      text-shadow: 0 3px 0 #1b1109;
    }

    .brand p {
      margin: 2px 0 0;
      font-weight: 800;
      color: #c9f38b;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 160px;
      min-height: 42px;
      padding: 8px 14px;
      border: 3px solid #f7db75;
      border-radius: 8px;
      background: #243a24;
      color: #fff;
      font-weight: 900;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,.25);
    }

    button.status-pill {
      appearance: none;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .top-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 8px 12px;
      border: 3px solid #f7db75;
      border-radius: 8px;
      background: #fff9e8;
      color: #243a24;
      font-weight: 900;
      text-decoration: none;
    }

    .top-link.button {
      font: inherit;
      cursor: pointer;
    }

    main {
      display: grid;
      grid-template-columns: minmax(150px, 210px) minmax(0, 1fr);
      gap: 12px;
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: 12px;
      min-height: 0;
      overflow: hidden;
    }

    .sidebar {
      align-self: start;
      display: grid;
      gap: 10px;
      max-height: 100%;
      overflow: auto;
      padding-right: 4px;
    }

    .theme-tab {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 10px;
      align-items: center;
      width: 100%;
      border: 3px solid #6d4b26;
      border-radius: 8px;
      padding: 8px;
      color: #2a1d11;
      background: #fff5cf;
      text-align: left;
      font-weight: 900;
      box-shadow: inset 0 -4px 0 rgba(92, 58, 18, .16);
    }

    .theme-tab.active {
      border-color: #193f1e;
      background: linear-gradient(180deg, #70c45c, #3b9b40);
      color: white;
      text-shadow: 0 2px 0 rgba(0,0,0,.35);
    }

    .tab-num {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: #2d6f31;
      color: #fff;
      border: 2px solid rgba(255,255,255,.7);
      font-size: 20px;
    }

    .tab-title {
      min-width: 0;
      line-height: 1.15;
    }

    .tab-title small {
      display: block;
      margin-top: 3px;
      color: inherit;
      opacity: .75;
      font-size: 12px;
      font-weight: 800;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      grid-template-rows: auto auto;
      gap: 12px;
      min-height: 0;
      overflow-y: auto;
      padding-right: 4px;
      scroll-behavior: smooth;
    }

    .hero {
      position: sticky;
      top: 0;
      z-index: 6;
      display: grid;
      grid-column: 1;
      grid-row: 1;
      grid-template-columns: 1fr;
      gap: 12px;
      align-items: stretch;
      min-width: 0;
      min-height: 0;
    }

    .poster-wrap {
      overflow: hidden;
      border: 5px solid #5c3a1d;
      border-radius: 8px;
      background: #2e1d11;
      box-shadow: 0 12px 24px rgba(47, 35, 16, .24);
    }

    .poster-wrap img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      aspect-ratio: 3 / 2;
    }

    .learning-panel {
      display: grid;
      grid-template-columns: minmax(230px, .72fr) minmax(520px, 2.1fr);
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 4px solid #704c25;
      border-radius: 8px;
      background: var(--paper);
      box-shadow: inset 0 -6px 0 rgba(123, 91, 47, .16);
    }

    .theme-heading {
      display: none;
    }

    .theme-heading h2 {
      margin: 0;
      font-size: clamp(20px, 2.1vw, 30px);
      color: var(--leaf-dark);
      letter-spacing: 0;
    }

    .theme-heading p {
      margin: 4px 0 0;
      font-weight: 900;
      color: #72512a;
    }

    .reward-board {
      position: relative;
      display: grid;
      grid-template-columns: minmax(210px, 1.1fr) minmax(130px, .75fr) minmax(230px, 1fr);
      gap: 8px;
      align-items: center;
      min-height: 96px;
      overflow: hidden;
      padding: 8px;
      border: 4px solid #2a1a0c;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.15), transparent 34%),
        repeating-linear-gradient(45deg, rgba(255,255,255,.08) 0 10px, transparent 10px 20px),
        linear-gradient(180deg, #223520, #142516);
      color: #fff8da;
      box-shadow: inset 0 -8px 0 rgba(0,0,0,.26), 0 10px 18px rgba(45, 35, 18, .16);
    }

    .reward-board::before {
      content: "";
      position: absolute;
      inset: -70% -12% auto;
      height: 120px;
      opacity: .28;
      background: radial-gradient(circle, var(--gem-glow, #54f0d8), transparent 68%);
      transform: translateY(-16px);
      pointer-events: none;
    }

    .reward-head {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }

    .gem-stage {
      position: relative;
      display: grid;
      place-items: center;
      width: 70px;
      height: 70px;
      border: 4px solid rgba(255,255,255,.28);
      border-radius: 8px;
      background: rgba(0,0,0,.2);
      box-shadow: inset 0 -5px 0 rgba(0,0,0,.24), 0 0 26px var(--gem-glow, rgba(84,240,216,.45));
    }

    .gem-stage svg {
      width: 54px;
      height: 54px;
      image-rendering: pixelated;
      filter: drop-shadow(0 8px 0 rgba(0,0,0,.22));
      animation: gem-idle 2.8s ease-in-out infinite;
    }

    .reward-board.reward-pulse .gem-stage svg {
      animation: gem-pop .7s ease;
    }

    .reward-board.level-up .gem-stage svg {
      animation: gem-level-up 1.2s ease;
    }

    .reward-copy {
      min-width: 0;
    }

    .reward-kicker {
      margin: 0;
      color: #bce9a4;
      font-size: 13px;
      font-weight: 900;
    }

    .reward-title {
      margin: 2px 0;
      font-size: clamp(19px, 1.7vw, 25px);
      line-height: 1;
      font-weight: 1000;
      overflow-wrap: anywhere;
    }

    .reward-exp {
      margin: 0;
      color: #ffe89b;
      font-weight: 900;
    }

    .reward-bar {
      position: relative;
      z-index: 1;
      height: 18px;
      overflow: hidden;
      border: 3px solid rgba(255,255,255,.32);
      border-radius: 8px;
      background: rgba(0,0,0,.28);
    }

    .reward-fill {
      width: 0%;
      height: 100%;
      background:
        linear-gradient(90deg, rgba(255,255,255,.35), transparent 30%),
        linear-gradient(90deg, var(--gem-dark, #1f8f75), var(--gem-main, #48e1c8), var(--gem-light, #d9fff7));
      box-shadow: 0 0 18px var(--gem-glow, #54f0d8);
      transition: width .55s cubic-bezier(.2, .9, .25, 1);
    }

    .reward-stats {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      min-width: 0;
    }

    .reward-stat {
      min-width: 0;
      padding: 6px;
      border: 2px solid rgba(255,255,255,.22);
      border-radius: 8px;
      background: rgba(255,255,255,.1);
      text-align: center;
      font-weight: 900;
    }

    .reward-stat strong {
      display: block;
      color: #fff;
      font-size: 18px;
      line-height: 1;
    }

    .reward-stat span {
      display: block;
      margin-top: 4px;
      color: #cce8bd;
      font-size: 11px;
    }

    .reward-toast {
      position: absolute;
      right: 12px;
      bottom: 8px;
      z-index: 3;
      max-width: calc(100% - 24px);
      padding: 8px 10px;
      border: 3px solid #ffe89b;
      border-radius: 8px;
      background: rgba(25, 40, 19, .94);
      color: #fff8da;
      font-weight: 1000;
      transform: translateY(12px);
      opacity: 0;
      pointer-events: none;
    }

    .reward-toast.show {
      animation: reward-toast .9s ease;
    }

    .gem-particle {
      position: fixed;
      z-index: 999;
      width: 12px;
      height: 12px;
      background: var(--gem-main, #48e1c8);
      border: 2px solid rgba(255,255,255,.55);
      box-shadow: 0 0 12px var(--gem-glow, #54f0d8);
      transform: translate3d(var(--from-x), var(--from-y), 0) rotate(45deg) scale(.75);
      opacity: 0;
      pointer-events: none;
      transition: transform .68s cubic-bezier(.18,.9,.25,1), opacity .68s ease;
    }

    .gem-particle.fly {
      transform: translate3d(var(--to-x), var(--to-y), 0) rotate(135deg) scale(1.05);
      opacity: 1;
    }

    .spark-ring {
      position: fixed;
      z-index: 998;
      width: 12px;
      height: 12px;
      border: 3px solid var(--gem-light, #d9fff7);
      box-shadow: 0 0 16px var(--gem-glow, #54f0d8);
      transform: translate3d(var(--x), var(--y), 0) scale(.4) rotate(45deg);
      opacity: .95;
      pointer-events: none;
      animation: spark-burst .78s ease forwards;
    }

    .reward-board.repair {
      animation: repair-glow .9s ease;
    }

    .reward-board.streak {
      animation: streak-glow .9s ease;
    }

    @keyframes gem-idle {
      50% { transform: translateY(-3px); }
    }

    @keyframes gem-pop {
      45% { transform: scale(1.14) rotate(8deg); }
      100% { transform: scale(1) rotate(0); }
    }

    @keyframes gem-level-up {
      20% { transform: scale(1.2) rotate(-10deg); }
      55% { transform: scale(1.32) rotate(12deg); }
      100% { transform: scale(1) rotate(0); }
    }

    @keyframes reward-toast {
      0% { opacity: 0; transform: translateY(12px); }
      18%, 78% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-6px); }
    }

    @keyframes spark-burst {
      100% {
        transform: translate3d(calc(var(--x) + var(--dx)), calc(var(--y) + var(--dy)), 0) scale(.9) rotate(135deg);
        opacity: 0;
      }
    }

    @keyframes repair-glow {
      35% { box-shadow: inset 0 -8px 0 rgba(0,0,0,.26), 0 0 0 8px rgba(115, 255, 155, .26); }
    }

    @keyframes streak-glow {
      35% { box-shadow: inset 0 -8px 0 rgba(0,0,0,.26), 0 0 0 8px rgba(255, 232, 95, .28); }
    }

    @media (prefers-reduced-motion: reduce) {
      .gem-stage svg,
      .reward-board.reward-pulse .gem-stage svg,
      .reward-board.level-up .gem-stage svg,
      .reward-board.repair,
      .reward-board.streak {
        animation: none;
      }

      .gem-particle,
      .spark-ring {
        display: none;
      }
    }

    .now-word {
      display: grid;
      place-items: center;
      min-height: 92px;
      padding: 10px;
      border: 4px solid #2d6f31;
      border-radius: 8px;
      background: linear-gradient(180deg, #f8ffe8, #d7f7bc);
      text-align: center;
    }

    .now-word strong {
      display: block;
      font-size: clamp(30px, 4vw, 52px);
      line-height: 1;
      color: #173b1d;
      overflow-wrap: anywhere;
    }

    .now-word span {
      display: block;
      margin-top: 6px;
      font-size: 20px;
      font-weight: 900;
      color: #9a2d22;
    }

    .panel-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .big-action {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(180deg, #f8d96b, #d59a2a);
      color: #2b1a08;
      font-weight: 1000;
      box-shadow: inset 0 -5px 0 rgba(70, 45, 8, .22);
    }

    .big-action.secondary {
      background: linear-gradient(180deg, #78d3ff, #2d8ac8);
      color: #082136;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      min-height: 0;
      align-content: start;
    }

    .card-flow {
      display: grid;
      grid-column: 1;
      grid-row: 2;
      gap: 12px;
      min-width: 0;
      min-height: 0;
      align-content: start;
    }

    .word-card {
      min-width: 0;
      min-height: 276px;
      display: grid;
      grid-template-rows: 196px auto;
      overflow: hidden;
      border: 4px solid #6a4a28;
      border-radius: 8px;
      background: #fffaf0;
      box-shadow: inset 0 -6px 0 rgba(110, 78, 37, .16), 0 6px 12px rgba(45, 35, 18, .12);
      transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    }

    .word-card:hover,
    .word-card:focus-visible {
      transform: translateY(-2px);
      border-color: var(--leaf);
      outline: none;
      box-shadow: inset 0 -6px 0 rgba(110, 78, 37, .16), 0 10px 18px rgba(45, 35, 18, .2);
    }

    .word-card.speaking {
      border-color: #f0b719;
      animation: pop .34s ease;
    }

    @keyframes pop {
      50% { transform: scale(1.025); }
    }

    .thumb {
      position: relative;
      min-height: 0;
      aspect-ratio: 1 / 1;
      background: #e9f4dc;
      display: grid;
      place-items: center;
      border-bottom: 3px solid #d2c09b;
      overflow: hidden;
    }

    .thumb canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .word-meta {
      position: relative;
      z-index: 2;
      display: grid;
      gap: 4px;
      padding: 12px;
      text-align: center;
      min-width: 0;
      min-height: 76px;
      align-content: center;
      background: linear-gradient(180deg, #fffdf5, #f8f2df);
      border-top: 3px solid #d2c09b;
    }

    .study-controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      align-items: stretch;
      min-width: 0;
    }

    .mode-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      width: 100%;
      padding: 6px;
      border: 4px solid #6b4a23;
      border-radius: 8px;
      background: #3d2818;
    }

    .mode-switch button {
      min-height: 40px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: #fff8da;
      font-weight: 900;
    }

    .cn-toggle {
      min-height: 60px;
      padding: 0 12px;
      border: 4px solid #6b4a23;
      border-radius: 8px;
      background: #fff9e8;
      color: #20330f;
      font-weight: 1000;
      white-space: nowrap;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,.14);
    }

    body[data-show-cn="false"] .cn-toggle {
      background: #f5c94d;
    }

    body[data-show-cn="false"] .word-meta span {
      visibility: hidden;
    }

    body[data-study-mode="learn"] [data-mode-button="learn"],
    body[data-study-mode="quiz"] [data-mode-button="quiz"] {
      background: #f5c94d;
      color: #20330f;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,.18);
    }

    body[data-study-mode="quiz"] .cards {
      filter: blur(5px) grayscale(.22);
      opacity: .46;
      pointer-events: none;
      user-select: none;
    }

    body[data-study-mode="learn"] .quiz {
      max-height: 0;
      min-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      border-width: 0;
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
      user-select: none;
    }

    .copyright-note {
      margin: 0;
      padding: 4px 10px;
      background: rgba(255, 249, 232, .82);
      color: #5d4927;
      font-size: 11px;
      font-weight: 800;
      text-align: center;
    }

    .word-meta b {
      font-size: clamp(20px, 1.85vw, 29px);
      line-height: 1.05;
      overflow-wrap: anywhere;
      word-break: normal;
      max-width: 100%;
    }

    .word-meta b.long-word {
      font-size: clamp(15px, 1.35vw, 21px);
    }

    .word-meta span {
      color: #207026;
      font-size: 22px;
      line-height: 1.05;
      font-weight: 900;
    }

    .quiz {
      position: relative;
      z-index: 5;
      display: grid;
      align-self: stretch;
      grid-column: 1 / -1;
      grid-template-rows: auto auto auto;
      gap: 10px;
      min-width: 0;
      min-height: 178px;
      max-height: 420px;
      margin-top: 8px;
      margin-bottom: 12px;
      padding: 12px;
      border: 4px solid #355d2e;
      border-radius: 8px;
      background: #edfbdc;
      box-shadow: inset 0 -6px 0 rgba(63, 105, 42, .14), 0 10px 22px rgba(54, 83, 35, .18);
      scroll-margin-top: 124px;
    }

    .quiz-top {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: center;
    }

    .quiz-label {
      display: inline-block;
      margin-bottom: 2px;
      color: #5b7c33;
      font-size: 15px;
      font-weight: 1000;
    }

    .rotate-tip {
      display: none;
    }

    .quiz-word {
      margin: 0;
      font-size: clamp(30px, 3.5vw, 50px);
      color: #143819;
      letter-spacing: 0;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      min-height: 0;
    }

    .answer {
      min-height: 52px;
      padding: 10px;
      border: 3px solid #5c7a2a;
      border-radius: 8px;
      background: #fffdf1;
      font-size: 20px;
      font-weight: 900;
      color: #1e391d;
    }

    .answer.correct {
      background: #b8ef95;
      border-color: #25742a;
    }

    .answer.wrong {
      background: #ffd0c8;
      border-color: #b64031;
    }

    .answer:disabled {
      cursor: default;
    }

    .feedback {
      min-height: 26px;
      font-size: 20px;
      font-weight: 900;
      color: #6a3e13;
    }

    @media (max-width: 1100px) {
      .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }

      .learning-panel {
        grid-template-columns: minmax(210px, .65fr) minmax(520px, 2fr);
      }

      .reward-board {
        grid-template-columns: minmax(180px, 1fr) minmax(120px, .62fr) minmax(240px, 1.15fr);
      }

      .answers {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 1180px) and (orientation: landscape) {
      .learning-panel {
        grid-template-columns: minmax(160px, .45fr) minmax(500px, 2.4fr);
      }

      .mode-switch {
        gap: 4px;
        padding: 4px;
        border-width: 3px;
      }

      .mode-switch button {
        min-height: 34px;
        padding: 4px 3px;
        font-size: 15px;
      }

      .study-controls {
        grid-template-columns: minmax(0, 1fr) 76px;
        gap: 4px;
      }

      .cn-toggle {
        min-height: 34px;
        padding: 4px 3px;
        border-width: 3px;
        font-size: 14px;
      }

      .reward-board {
        grid-template-columns: minmax(180px, 1fr) minmax(118px, .62fr) minmax(246px, 1.2fr);
      }

      .reward-stat span {
        white-space: nowrap;
      }
    }

    @media (max-width: 820px) {
      .topbar {

    async function api(path, options = {}) {
      const response = await fetch(path, {
        ...options,
        headers: { "Content-Type": "application/json", ...(options.headers || {}) }
      });
      if (response.status === 401) {
        location.href = "/login";
        return null;
      }
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || "操作失败");
      }
      return data;
    }

    async function initUser() {
      try {
        const data = await api("/api/me");
        document.body.dataset.role = data?.user?.role || "user";
      } catch {}
    }

    function setStudyMode(mode) {
      studyMode = mode === "quiz" ? "quiz" : "learn";
      document.body.dataset.studyMode = studyMode;
      requestAnimationFrame(() => {
        const target = studyMode === "quiz" ? els.quiz : els.cards;
        setTimeout(() => target?.scrollIntoView({ behavior: "smooth", block: "start" }), 30);
      });
    }

    function setCardChineseVisible(visible) {
      showCardChinese = Boolean(visible);
      document.body.dataset.showCn = showCardChinese ? "true" : "false";
      if (els.cnToggleBtn) {
        els.cnToggleBtn.textContent = showCardChinese ? "隐藏中文" : "显示中文";
        els.cnToggleBtn.setAttribute("aria-pressed", String(!showCardChinese));
      }
      localStorage.setItem(showCnStorageKey, showCardChinese ? "true" : "false");
    }

    function gemSvg(theme) {
      return `
        <svg viewBox="0 0 64 64" role="img" aria-label="宝石等级">
          <rect x="18" y="4" width="28" height="8" fill="${theme.light}"/>
          <rect x="10" y="12" width="44" height="10" fill="${theme.main}"/>

          <rect x="14" y="22" width="36" height="14" fill="${theme.main}"/>
          <rect x="18" y="36" width="28" height="14" fill="${theme.main}"/>
          <rect x="24" y="50" width="16" height="8" fill="${theme.dark}"/>
          <rect x="22" y="14" width="12" height="8" fill="${theme.light}"/>
          <rect x="40" y="24" width="8" height="10" fill="${theme.light}"/>
        </svg>
      `;
    }

    function applyGemTheme(gemKey) {
      const theme = gemThemes[gemKey] || gemThemes.coal;
      els.rewardPanel.style.setProperty("--gem-main", theme.main);
      els.rewardPanel.style.setProperty("--gem-dark", theme.dark);
      els.rewardPanel.style.setProperty("--gem-light", theme.light);
      els.rewardPanel.style.setProperty("--gem-glow", theme.glow);
      els.rewardGem.innerHTML = gemSvg(theme);
      els.rewardPanel.dataset.gem = gemKey || "coal";
      return theme;
    }

    function renderRewardPanel(state) {
      if (!state) return;
      rewardState = state;
      applyGemTheme(state.gemKey);
      els.rewardTitle.textContent = `Lv${state.level} ${state.title}`;
      els.rewardExp.textContent = `${state.levelExp} / ${state.levelNeed} EXP`;
      els.rewardFill.style.width = `${state.progressPercent || 0}%`;
      els.rewardToday.textContent = state.todayExp || 0;
      els.rewardStreak.textContent = state.streakCorrect || 0;
      els.rewardFixed.textContent = state.fixedReviews || 0;
    }

    function showRewardToast(text) {
      if (!text) return;
      els.rewardToast.textContent = text;
      els.rewardToast.classList.remove("show");
      void els.rewardToast.offsetWidth;
      els.rewardToast.classList.add("show");
    }

    function pulseReward(className, duration = 900) {
      els.rewardPanel.classList.remove(className);
      void els.rewardPanel.offsetWidth;
      els.rewardPanel.classList.add(className);
      setTimeout(() => els.rewardPanel.classList.remove(className), duration);
    }

    function rectCenter(node) {
      const rect = node.getBoundingClientRect();
      return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
    }

    function spawnGemParticles(sourceNode, count = 4) {
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      const from = sourceNode ? rectCenter(sourceNode) : rectCenter(els.quiz);
      const to = rectCenter(els.rewardGem);
      const theme = gemThemes[rewardState?.gemKey] || gemThemes.coal;
      for (let i = 0; i < count; i += 1) {
        const particle = document.createElement("span");
        particle.className = "gem-particle";
        particle.style.setProperty("--gem-main", theme.main);
        particle.style.setProperty("--gem-glow", theme.glow);
        particle.style.setProperty("--from-x", `${from.x + (Math.random() * 38 - 19)}px`);
        particle.style.setProperty("--from-y", `${from.y + (Math.random() * 24 - 12)}px`);
        particle.style.setProperty("--to-x", `${to.x + (Math.random() * 22 - 11)}px`);
        particle.style.setProperty("--to-y", `${to.y + (Math.random() * 22 - 11)}px`);
        document.body.appendChild(particle);
        requestAnimationFrame(() => particle.classList.add("fly"));
        setTimeout(() => particle.remove(), 760);
      }
    }

    function burstGem() {
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      const center = rectCenter(els.rewardGem);
      const theme = gemThemes[rewardState?.gemKey] || gemThemes.coal;
      for (let i = 0; i < 12; i += 1) {
        const angle = (Math.PI * 2 * i) / 12;
        const spark = document.createElement("span");
        spark.className = "spark-ring";
        spark.style.setProperty("--gem-light", theme.light);
        spark.style.setProperty("--gem-glow", theme.glow);
        spark.style.setProperty("--x", `${center.x}px`);
        spark.style.setProperty("--y", `${center.y}px`);
        spark.style.setProperty("--dx", `${Math.cos(angle) * 62}px`);
        spark.style.setProperty("--dy", `${Math.sin(angle) * 46}px`);
        document.body.appendChild(spark);
        setTimeout(() => spark.remove(), 820);
      }
    }

    function playRewardEvents(events = [], sourceNode = null) {
      if (!events.length) return;
      events.forEach((event, index) => {
        setTimeout(() => {
          if (event.type === "level_up") {
            pulseReward("level-up", 1200);
            burstGem();
            showRewardToast(event.label || "宝石升级");
            return;
          }
          if (event.type === "review_fixed") {
            pulseReward("repair", 900);
          } else if (event.type === "streak") {
            pulseReward("streak", 900);
          } else {
            pulseReward("reward-pulse", 700);
          }
          spawnGemParticles(sourceNode, event.type === "theme_badge" ? 7 : event.type === "streak" ? 6 : 4);
          showRewardToast(event.label || (event.exp ? `获得 +${event.exp} EXP` : ""));
        }, index * 220);
      });
    }

    async function initRewards() {
      const data = await api("/api/rewards").catch(() => null);
      if (data?.rewardState) renderRewardPanel(data.rewardState);
    }

    function handleRewardResponse(data, sourceNode) {
      if (data?.rewardState) renderRewardPanel(data.rewardState);
      if (data?.rewardEvents?.length) playRewardEvents(data.rewardEvents, sourceNode);
    }

    function loadImage(src) {
      if (imageCache.has(src)) return imageCache.get(src);
      const promise = new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.src = src;
      });
      imageCache.set(src, promise);
      return promise;
    }

    function pickVoice() {
      if (!("speechSynthesis" in window)) {
        els.voiceStatus.textContent = "无语音支持";
        return;
      }
      const voices = speechSynthesis.getVoices();
      selectedVoice =
        voices.find((voice) => voice.lang === "en-US") ||
        voices.find((voice) => voice.lang && voice.lang.toLowerCase().startsWith("en-us")) ||
        voices.find((voice) => voice.lang && voice.lang.toLowerCase().startsWith("en")) ||
        null;
      els.voiceStatus.textContent = voiceUnlocked ? "语音已开启" : "开启语音";
    }

    function playFallbackAudio(text) {
      if (!fallbackAudio) {
        fallbackAudio = new Audio();
        fallbackAudio.preload = "auto";
      }
      const words = text.trim().split(/\s+/).filter(Boolean);
      fallbackAudio.pause();
      fallbackAudio.currentTime = 0;
      fallbackAudio.src = `https://dict.youdao.com/dictvoice?type=2&audio=${encodeURIComponent(text).replace(/%20/g, "+")}`;
      els.voiceStatus.textContent = "在线语音";
      return fallbackAudio.play()
        .then(() => {
          voiceUnlocked = true;
          els.voiceStatus.textContent = "语音已开启";
        })
        .catch(() => {
          if (words.length > 1) {
            playFallbackSequence(words);
            return;
          }
          els.voiceStatus.textContent = "请再点一次";
        });
    }

    function playFallbackSequence(words) {
      let index = 0;
      const makeUrl = (word) => `https://dict.youdao.com/dictvoice?type=2&audio=${encodeURIComponent(word)}`;
      if (!nextFallbackAudio) {
        nextFallbackAudio = new Audio();
        nextFallbackAudio.preload = "auto";
      }
      const playNext = () => {
        if (index >= words.length) {
          voiceUnlocked = true;
          els.voiceStatus.textContent = "语音已开启";
          return;
        }
        if (index + 1 < words.length) {
          nextFallbackAudio.src = makeUrl(words[index + 1]);
          nextFallbackAudio.load();
        }
        fallbackAudio.pause();
        fallbackAudio.currentTime = 0;
        fallbackAudio.src = makeUrl(words[index]);
        index += 1;
        els.voiceStatus.textContent = "在线语音";
        fallbackAudio.onended = () => setTimeout(playNext, 20);
        fallbackAudio.onerror = () => {
          els.voiceStatus.textContent = "请再点一次";
          fallbackAudio.onended = null;
          fallbackAudio.onerror = null;
        };
        fallbackAudio.play().catch(() => {
          els.voiceStatus.textContent = "请再点一次";
        });
      };
      playNext();
    }

    function playTencentTts(text) {
      if (!ttsAudio) {
        ttsAudio = new Audio();
        ttsAudio.preload = "auto";
      }
      ttsAudio.pause();
      ttsAudio.currentTime = 0;
      ttsAudio.src = `/api/tts?text=${encodeURIComponent(text)}`;
      els.voiceStatus.textContent = "腾讯云语音";
      return ttsAudio.play()
        .then(() => {
          voiceUnlocked = true;
          els.voiceStatus.textContent = "语音已开启";
          return true;
        })
        .catch(() => false);
    }

    async function speak(text, options = {}) {
      if (!options.browserOnly) {
        const played = await playTencentTts(text);
        if (played) return;
      }
      if (options.onlineOnly) {
        playFallbackAudio(text);
        return;
      }
      if (!("speechSynthesis" in window)) {
        playFallbackAudio(text);
        return;
      }
      pickVoice();
      speechSynthesis.resume();
      if (!options.noCancel) {
        speechSynthesis.cancel();
      }
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = selectedVoice?.lang || "en-US";
      if (selectedVoice) {
        utterance.voice = selectedVoice;
      }
      utterance.rate = 0.82;
      utterance.pitch = 1.05;
      utterance.volume = options.quiet ? 0.01 : 1;
      utterance.onstart = () => {
        voiceUnlocked = true;
        els.voiceStatus.textContent = "语音已开启";
      };
      utterance.onend = () => {
        activeUtterance = null;
      };
      utterance.onerror = (event) => {
        activeUtterance = null;
        if (event.error === "interrupted" || event.error === "canceled") {
          els.voiceStatus.textContent = voiceUnlocked ? "语音已开启" : "开启语音";
          return;
        }
        playFallbackAudio(text);
      };
      activeUtterance = utterance;
      speechSynthesis.speak(utterance);
    }

    function unlockVoice() {
      voiceUnlocked = true;
      speak(currentItem.word, { onlineOnly: true });
    }

    function renderTabs() {
      els.themeTabs.innerHTML = themes.map((theme, index) => `
        <button class="theme-tab ${index === currentThemeIndex ? "active" : ""}" type="button" data-theme="${index}">
          <span class="tab-num">${String(index + 1).padStart(2, "0")}</span>
          <span class="tab-title">${theme.title}<small>${theme.subtitle}</small></span>
        </button>
      `).join("");
    }

    async function drawThumb(canvas, theme, item) {
      const img = await loadImage(theme.image);
      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      const width = Math.max(220, Math.round(rect.width * dpr));
      const height = Math.max(130, Math.round(rect.height * dpr));
      canvas.width = width;
      canvas.height = height;
      const sourceCrop = item.iconRect || item.cropRect || {
        x: crop.x + item.cropCol * (crop.w / 4),
        y: crop.y + item.cropRow * (crop.h / 4),
        w: crop.w / 4,
        h: crop.h / 4
      };
      const sx = sourceCrop.x;
      const sy = sourceCrop.y;
      const sw = sourceCrop.w;
      const sh = sourceCrop.h;
      ctx.imageSmoothingEnabled = true;
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#eef8e7";
      ctx.fillRect(0, 0, width, height);
      if (item.iconRect) {
        const scale = Math.min(width / sw, height / sh) * 0.86;
        const dw = sw * scale;
        const dh = sh * scale;
        const dx = (width - dw) / 2;
        const dy = (height - dh) / 2;
        ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
        if (item.iconCleanRects?.length) {
          ctx.fillStyle = "#fffdf5";
          item.iconCleanRects.forEach((cleanRect) => {
            const cleanX = dx + (cleanRect.x - sx) * scale;
            const cleanY = dy + (cleanRect.y - sy) * scale;
            const cleanW = cleanRect.w * scale;
            const cleanH = cleanRect.h * scale;
            ctx.fillRect(cleanX, cleanY, cleanW, cleanH);
          });
        }
      } else {
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, width, height);
      }
    }

    function selectItem(item, card) {
      currentItem = item;
      document.querySelectorAll(".word-card.speaking").forEach((node) => node.classList.remove("speaking"));
      if (card) {
        card.classList.add("speaking");
        setTimeout(() => card.classList.remove("speaking"), 520);
      }
      api("/api/progress/word", {
        method: "POST",
        body: JSON.stringify({ themeId: themes[currentThemeIndex].id, word: item.word })
      }).then((data) => handleRewardResponse(data, card)).catch(() => {});
      speak(item.word);
    }

    function renderCards() {
      const theme = themes[currentThemeIndex];
      els.cards.innerHTML = theme.items.map((item, index) => `
        <button class="word-card" type="button" data-word="${index}">
          <span class="thumb"><canvas aria-hidden="true"></canvas></span>
          <span class="word-meta"><b class="${item.word.length > 16 ? "long-word" : ""}">${item.word}</b><span>${item.cn}</span></span>
        </button>
      `).join("");
      els.cards.querySelectorAll(".word-card").forEach((card) => {
        const item = theme.items[Number(card.dataset.word)];
        card.addEventListener("click", () => selectItem(item, card));
        drawThumb(card.querySelector("canvas"), theme, item);
      });
    }

    function shuffle(array) {
      return array.map((value) => ({ value, sort: Math.random() })).sort((a, b) => a.sort - b.sort).map(({ value }) => value);
    }

    function makeQuizOptions(theme, item) {
      const wrongItems = shuffle(theme.items.filter((candidate) => candidate.cn !== item.cn)).slice(0, 3);
      return shuffle([item, ...wrongItems]).map((candidate) => candidate.cn);
    }

    function makeLocalQuiz(theme) {
      const item = theme.items[Math.floor(Math.random() * theme.items.length)] || theme.items[0];
      return {
        word: item.word,
        options: makeQuizOptions(theme, item),
        localOnly: true
      };
    }

    async function newQuiz() {
      const theme = themes[currentThemeIndex];
      let data = await api("/api/quiz/next", {
        method: "POST",
        body: JSON.stringify({ themeId: theme.id })
      }).catch(() => null);
      if (!data?.word) data = makeLocalQuiz(theme);
      quizItem = theme.items.find((item) => item.word === data.word) || theme.items[0];
      const options = Array.isArray(data.options) && data.options.length
        ? data.options
        : makeQuizOptions(theme, quizItem);
      els.quizWord.textContent = quizItem.word;
      els.feedback.textContent = "";
      els.answers.innerHTML = options.map((cn) => `
        <button class="answer" type="button" data-cn="${cn}">${cn}</button>
      `).join("");
      let answered = false;
      els.answers.querySelectorAll(".answer").forEach((button) => {
        button.addEventListener("click", async () => {
          if (answered) return;
          answered = true;
          let result = data.localOnly
            ? null
            : await api("/api/quiz/answer", {
              method: "POST",
              body: JSON.stringify({ themeId: theme.id, word: quizItem.word, selectedCn: button.dataset.cn })
            }).catch(() => null);
          if (!result) {
            result = {
              correct: button.dataset.cn === quizItem.cn,
              correctCn: quizItem.cn,
              localOnly: true
            };
          }
          if (result?.error) {
            answered = false;
            els.feedback.textContent = result.error;
            return;
          }
          const correct = Boolean(result.correct);
          els.answers.querySelectorAll(".answer").forEach((node) => {
            node.disabled = true;
            if (node.dataset.cn === result.correctCn) node.classList.add("correct");
          });
          if (!correct) button.classList.add("wrong");
          els.feedback.textContent = correct ? "答对了！" : "正确答案：" + result.correctCn;
          handleRewardResponse(result, button);
          speak(quizItem.word);
        }, { once: true });
      });
    }

    function setTheme(index) {
      currentThemeIndex = index;
      const theme = themes[index];
      currentItem = theme.items[0];
      if (els.poster) {
        els.poster.src = theme.image;
        els.poster.alt = theme.title;
      }
      els.themeTitle.textContent = theme.title;
      els.themeSubtitle.textContent = theme.subtitle;
      renderTabs();
      renderCards();
      newQuiz();
      setStudyMode("learn");
    }

    els.themeTabs.addEventListener("click", (event) => {
      const button = event.target.closest("[data-theme]");
      if (button) setTheme(Number(button.dataset.theme));
    });

    els.quizBtn.addEventListener("click", newQuiz);
    els.speakQuizBtn.addEventListener("click", () => quizItem && speak(quizItem.word));
    els.voiceStatus.addEventListener("click", unlockVoice);
    els.logoutBtn.addEventListener("click", async () => {
      await api("/api/auth/logout", { method: "POST", body: "{}" }).catch(() => null);
      location.href = "/login";
    });
    els.modeButtons.forEach((button) => {
      button.addEventListener("click", () => setStudyMode(button.dataset.modeButton));
    });
    els.cnToggleBtn?.addEventListener("click", () => setCardChineseVisible(!showCardChinese));
    window.speechSynthesis?.addEventListener?.("voiceschanged", pickVoice);
    window.addEventListener("resize", () => renderCards());

    initUser();
    initRewards();
    setCardChineseVisible(showCardChinese);
    setStudyMode("learn");
    pickVoice();
    setTheme(0);
  </script>
</body>
</html>
