<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minecraft English Reader</title>
  <style>
    :root {
      --bg: #dff4cf;
      --ink: #182317;
      --leaf: #2f7d32;
      --leaf-dark: #1f5f2a;
      --wood: #8a5528;
      --gold: #f5c94d;
      --paper: #fff9e8;
      --line: #7b5b2f;
      --blue: #2d8ac8;
      --red: #c64238;
      font-family: "Trebuchet MS", "Microsoft YaHei", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255,255,255,.65), rgba(255,255,255,0) 230px),
        repeating-linear-gradient(45deg, rgba(80, 143, 66, .14) 0 14px, rgba(80, 143, 66, .05) 14px 28px),
        var(--bg);
    }

    button {
      font: inherit;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 10px 18px;
      background: linear-gradient(180deg, #3d2818, #7b4b24);
      border-bottom: 5px solid #2c1a0d;
      color: #fff8da;
      box-shadow: 0 8px 20px rgba(28, 21, 10, .25);
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(22px, 2.6vw, 34px);
      letter-spacing: 0;
      text-shadow: 0 3px 0 #1b1109;
    }

    .brand p {
      margin: 2px 0 0;
      font-weight: 800;
      color: #c9f38b;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 160px;
      min-height: 42px;
      padding: 8px 14px;
      border: 3px solid #f7db75;
      border-radius: 8px;
      background: #243a24;
      color: #fff;
      font-weight: 900;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,.25);
    }

    button.status-pill {
      appearance: none;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .top-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 8px 12px;
      border: 3px solid #f7db75;
      border-radius: 8px;
      background: #fff9e8;
      color: #243a24;
      font-weight: 900;
      text-decoration: none;
    }

    .top-link.button {
      font: inherit;
      cursor: pointer;
    }

    main {
      display: grid;
      grid-template-columns: minmax(220px, 270px) minmax(0, 1fr);
      gap: 12px;
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: 12px;
      min-height: calc(100vh - 86px);
    }

    .sidebar {
      align-self: start;
      position: sticky;
      top: 82px;
      display: grid;
      gap: 10px;
      max-height: calc(100vh - 104px);
      overflow: auto;
      padding-right: 4px;
    }

    .theme-tab {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 10px;
      align-items: center;
      width: 100%;
      border: 3px solid #6d4b26;
      border-radius: 8px;
      padding: 8px;
      color: #2a1d11;
      background: #fff5cf;
      text-align: left;
      font-weight: 900;
      box-shadow: inset 0 -4px 0 rgba(92, 58, 18, .16);
    }

    .theme-tab.active {
      border-color: #193f1e;
      background: linear-gradient(180deg, #70c45c, #3b9b40);
      color: white;
      text-shadow: 0 2px 0 rgba(0,0,0,.35);
    }

    .tab-num {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: #2d6f31;
      color: #fff;
      border: 2px solid rgba(255,255,255,.7);
      font-size: 20px;
    }

    .tab-title {
      min-width: 0;
      line-height: 1.15;
    }

    .tab-title small {
      display: block;
      margin-top: 3px;
      color: inherit;
      opacity: .75;
      font-size: 12px;
      font-weight: 800;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(310px, 360px);
      grid-template-rows: auto auto 1fr;
      gap: 12px;
      min-height: 0;
    }

    .hero {
      display: grid;
      grid-column: 2;
      grid-row: 2;
      grid-template-columns: 1fr;
      gap: 12px;
      align-items: stretch;
    }

    .poster-wrap {
      overflow: hidden;
      border: 5px solid #5c3a1d;
      border-radius: 8px;
      background: #2e1d11;
      box-shadow: 0 12px 24px rgba(47, 35, 16, .24);
    }

    .poster-wrap img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      aspect-ratio: 3 / 2;
    }

    .learning-panel {
      display: grid;
      grid-template-columns: 1fr;
      align-items: stretch;
      gap: 10px;
      padding: 12px;
      border: 4px solid #704c25;
      border-radius: 8px;
      background: var(--paper);
      box-shadow: inset 0 -6px 0 rgba(123, 91, 47, .16);
    }

    .theme-heading h2 {
      margin: 0;
      font-size: clamp(22px, 2.5vw, 34px);
      color: var(--leaf-dark);
      letter-spacing: 0;
    }

    .theme-heading p {
      margin: 4px 0 0;
      font-weight: 900;
      color: #72512a;
    }

    .now-word {
      display: grid;
      place-items: center;
      min-height: 92px;
      padding: 10px;
      border: 4px solid #2d6f31;
      border-radius: 8px;
      background: linear-gradient(180deg, #f8ffe8, #d7f7bc);
      text-align: center;
    }

    .now-word strong {
      display: block;
      font-size: clamp(30px, 4vw, 52px);
      line-height: 1;
      color: #173b1d;
      overflow-wrap: anywhere;
    }

    .now-word span {
      display: block;
      margin-top: 6px;
      font-size: 20px;
      font-weight: 900;
      color: #9a2d22;
    }

    .panel-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .big-action {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(180deg, #f8d96b, #d59a2a);
      color: #2b1a08;
      font-weight: 1000;
      box-shadow: inset 0 -5px 0 rgba(70, 45, 8, .22);
    }

    .big-action.secondary {
      background: linear-gradient(180deg, #78d3ff, #2d8ac8);
      color: #082136;
    }

    .cards {
      display: grid;
      grid-column: 1;
      grid-row: 2 / span 2;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      min-height: 0;
    }

    .word-card {
      min-width: 0;
      min-height: 220px;
      display: grid;
      grid-template-rows: 1fr auto;
      overflow: hidden;
      border: 4px solid #6a4a28;
      border-radius: 8px;
      background: #fffaf0;
      box-shadow: inset 0 -6px 0 rgba(110, 78, 37, .16), 0 6px 12px rgba(45, 35, 18, .12);
      transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    }

    .word-card:hover,
    .word-card:focus-visible {
      transform: translateY(-2px);
      border-color: var(--leaf);
      outline: none;
      box-shadow: inset 0 -6px 0 rgba(110, 78, 37, .16), 0 10px 18px rgba(45, 35, 18, .2);
    }

    .word-card.speaking {
      border-color: #f0b719;
      animation: pop .34s ease;
    }

    @keyframes pop {
      50% { transform: scale(1.025); }
    }

    .thumb {
      min-height: 128px;
      background: #e9f4dc;
      display: grid;
      place-items: center;
      border-bottom: 3px solid #d2c09b;
    }

    .thumb canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .word-meta {
      display: grid;
      gap: 4px;
      padding: 12px;
      text-align: center;
      min-width: 0;
    }

    .mode-switch {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      width: min(520px, 100%);
      justify-self: center;
      padding: 6px;
      border: 4px solid #6b4a23;
      border-radius: 8px;
      background: #3d2818;
    }

    .mode-switch button {
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: #fff8da;
      font-weight: 900;
    }

    body[data-study-mode="learn"] [data-mode-button="learn"],
    body[data-study-mode="quiz"] [data-mode-button="quiz"] {
      background: #f5c94d;
      color: #20330f;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,.18);
    }

    body[data-study-mode="learn"] .quiz,
    body[data-study-mode="quiz"] .cards {
      filter: blur(5px) grayscale(.25);
      opacity: .48;
      pointer-events: none;
      user-select: none;
    }

    .copyright-note {
      grid-column: 1 / -1;
      margin: 0;
      padding: 10px 12px;
      border: 3px solid #b79556;
      border-radius: 8px;
      background: rgba(255, 249, 232, .92);
      color: #5d4927;
      font-size: 13px;
      font-weight: 800;
      text-align: center;
    }

    .word-meta b {
      font-size: clamp(20px, 1.85vw, 29px);
      line-height: 1.05;
      overflow-wrap: anywhere;
      word-break: normal;
      max-width: 100%;
    }

    .word-meta b.long-word {
      font-size: clamp(15px, 1.35vw, 21px);
    }

    .word-meta span {
      color: #207026;
      font-size: 22px;
      font-weight: 900;
    }

    .quiz {
      display: grid;
      align-self: stretch;
      grid-column: 2;
      grid-row: 3;
      grid-template-rows: auto auto 1fr;
      gap: 10px;
      padding: 12px;
      border: 4px solid #355d2e;
      border-radius: 8px;
      background: linear-gradient(180deg, #f7ffe6, #d8f0c4);
    }

    .quiz-top {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: center;
    }

    .rotate-tip {
      display: none;
    }

    .quiz-word {
      margin: 0;
      font-size: clamp(30px, 3.5vw, 50px);
      color: #143819;
      letter-spacing: 0;
    }

    .answers {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .answer {
      min-height: 52px;
      padding: 10px;
      border: 3px solid #5c7a2a;
      border-radius: 8px;
      background: #fffdf1;
      font-size: 20px;
      font-weight: 900;
      color: #1e391d;
    }

    .answer.correct {
      background: #b8ef95;
      border-color: #25742a;
    }

    .answer.wrong {
      background: #ffd0c8;
      border-color: #b64031;
    }

    .feedback {
      min-height: 30px;
      font-size: 20px;
      font-weight: 900;
      color: #6a3e13;
    }

    @media (max-width: 1100px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .quiz {
        grid-column: auto;
        grid-row: auto;
      }

      .learning-panel {
        grid-template-columns: 1fr;
      }

      .answers {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 820px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .cards,
      .answers {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      main {
        padding: 10px;
      }

      .cards,
      .answers,
      .panel-actions {
        grid-template-columns: 1fr;
      }

    }

    @media (max-width: 940px) and (orientation: landscape) {
      .topbar {
        position: static;
        grid-template-columns: 1fr auto;
        padding: 6px 10px;
      }

      .brand h1 {
        font-size: 20px;
      }

      .brand p,
      .copyright-note {
        display: none;
      }

      main {
        grid-template-columns: 180px minmax(0, 1fr);
        min-height: auto;
        padding: 8px;
      }

      .sidebar {
        position: static;
        max-height: calc(100vh - 76px);
      }

      .theme-tab {
        grid-template-columns: 34px 1fr;
        gap: 6px;
        padding: 7px;
      }

      .workspace {
        grid-template-columns: minmax(0, 1fr) minmax(250px, 300px);
        grid-template-rows: auto auto 1fr;
        gap: 8px;
      }

      .hero {
        grid-column: 2;
        grid-row: 2;
      }

      .cards {
        grid-column: 1;
        grid-row: 2 / span 2;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .word-card {
        min-height: 150px;
      }

      .thumb {
        min-height: 82px;
      }

      .word-meta {
        padding: 8px;
      }

      .word-meta b {
        font-size: 16px;
      }

      .word-meta span {
        font-size: 17px;
      }

      .quiz {
        grid-column: 2;
        grid-row: 3;
        padding: 8px;
      }

      .quiz-word {
        font-size: 28px;
      }

      .answer {
        min-height: 42px;
        font-size: 17px;
      }
    }

    @media (max-width: 760px) and (orientation: portrait) {
      .rotate-tip {
        position: fixed;
        inset: 0;
        z-index: 999;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(20, 36, 18, .94);
        color: #fff9e8;
        text-align: center;
      }

      .rotate-tip div {
        max-width: 360px;
        padding: 22px;
        border: 4px solid #f5c94d;
        border-radius: 8px;
        background: #2f4d28;
        font-size: 22px;
        font-weight: 900;
        line-height: 1.35;
      }
    }
  </style>
</head>

  <div class="rotate-tip" aria-hidden="true">
    <div>请将手机横屏使用，卡片和答题区会更清楚。</div>
  </div>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>Minecraft English Reader</h1>
        <p>我的世界英语点读学习 · 方块切片修复 v7</p>

      <div class="top-actions">
        <a class="top-link" href="/progress">我的进度</a>
        <button class="top-link button" id="logoutBtn" type="button">退出</button>
        <button class="status-pill" id="voiceStatus" type="button">开启语音</button>
      </div>
    </header>

    <main>
      <nav class="sidebar" id="themeTabs" aria-label="主题"></nav>

      <section class="workspace">
        <div class="mode-switch" aria-label="学习模式切换">
          <button type="button" data-mode-button="learn">学习模式</button>
          <button type="button" data-mode-button="quiz">答题模式</button>
        </div>

        <section class="hero">
          <aside class="learning-panel">
            <div class="theme-heading">
              <h2 id="themeTitle"></h2>
              <p id="themeSubtitle"></p>
            </div>
            <div class="now-word">
              <div>
                <strong id="currentWord">block</strong>
                <span id="currentCn">方块</span>
              </div>
            </div>
            <div class="panel-actions">
              <button class="big-action" id="repeatBtn" type="button">再读一次</button>
            </div>
          </aside>
        </section>

        <section class="cards" id="cards"></section>

        <section class="quiz" id="quiz">
          <div class="quiz-top">
            <h2 class="quiz-word" id="quizWord"></h2>
            <button class="big-action secondary" id="speakQuizBtn" type="button">读题</button>
            <button class="big-action secondary" id="quizBtn" type="button">下一题</button>
          </div>
          <div class="answers" id="answers"></div>
          <div class="feedback" id="feedback"></div>
        </section>
        <p class="copyright-note">非官方学习工具，与 Mojang、Microsoft、Minecraft 官方无关联，仅供私人学习交流使用。</p>
      </section>
    </main>
  </div>

    const crop = { x: 30, y: 165, w: 1476, h: 715 };
    const imageCache = new Map();
    let currentThemeIndex = 0;
    let currentItem = themes[0].items[0];
    let quizItem = null;
    let selectedVoice = null;
    let activeUtterance = null;
    let voiceUnlocked = false;
    let fallbackAudio = null;
    let nextFallbackAudio = null;
    let ttsAudio = null;
    let studyMode = "learn";

    const els = {
      logoutBtn: document.querySelector("#logoutBtn"),
      themeTabs: document.querySelector("#themeTabs"),
      poster: document.querySelector("#themePoster"),
      themeTitle: document.querySelector("#themeTitle"),
      themeSubtitle: document.querySelector("#themeSubtitle"),
      cards: document.querySelector("#cards"),
      currentWord: document.querySelector("#currentWord"),

      repeatBtn: document.querySelector("#repeatBtn"),
      quizBtn: document.querySelector("#quizBtn"),
      quizWord: document.querySelector("#quizWord"),
      speakQuizBtn: document.querySelector("#speakQuizBtn"),
      answers: document.querySelector("#answers"),
      feedback: document.querySelector("#feedback"),
      voiceStatus: document.querySelector("#voiceStatus"),
      modeButtons: document.querySelectorAll("[data-mode-button]")
    };

    async function api(path, options = {}) {
      const response = await fetch(path, {
        ...options,
        headers: { "Content-Type": "application/json", ...(options.headers || {}) }
      });
      if (response.status === 401) {
        location.href = "/login";
        return null;
      }
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || "操作失败");
      }
      return data;
    }

    async function initUser() {
      try {
        const data = await api("/api/me");
        document.body.dataset.role = data?.user?.role || "user";
      } catch {}
    }

    function setStudyMode(mode) {
      studyMode = mode === "quiz" ? "quiz" : "learn";
      document.body.dataset.studyMode = studyMode;
    }

    function loadImage(src) {
      if (imageCache.has(src)) return imageCache.get(src);
      const promise = new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.src = src;
      });
      imageCache.set(src, promise);
      return promise;
    }

    function pickVoice() {
      if (!("speechSynthesis" in window)) {
        els.voiceStatus.textContent = "无语音支持";
        return;
      }
      const voices = speechSynthesis.getVoices();
      selectedVoice =
        voices.find((voice) => voice.lang === "en-US") ||
        voices.find((voice) => voice.lang && voice.lang.toLowerCase().startsWith("en-us")) ||
        voices.find((voice) => voice.lang && voice.lang.toLowerCase().startsWith("en")) ||
        null;
      els.voiceStatus.textContent = voiceUnlocked ? "语音已开启" : "开启语音";
    }

    function playFallbackAudio(text) {
      if (!fallbackAudio) {
        fallbackAudio = new Audio();
        fallbackAudio.preload = "auto";
      }
      const words = text.trim().split(/\s+/).filter(Boolean);
      fallbackAudio.pause();
      fallbackAudio.currentTime = 0;
      fallbackAudio.src = `https://dict.youdao.com/dictvoice?type=2&audio=${encodeURIComponent(text).replace(/%20/g, "+")}`;
      els.voiceStatus.textContent = "在线语音";
      return fallbackAudio.play()
        .then(() => {
          voiceUnlocked = true;
          els.voiceStatus.textContent = "语音已开启";
        })
        .catch(() => {
          if (words.length > 1) {
            playFallbackSequence(words);
            return;
          }
          els.voiceStatus.textContent = "请再点一次";
        });
    }

    function playFallbackSequence(words) {
      let index = 0;
      const makeUrl = (word) => `https://dict.youdao.com/dictvoice?type=2&audio=${encodeURIComponent(word)}`;
      if (!nextFallbackAudio) {
        nextFallbackAudio = new Audio();
        nextFallbackAudio.preload = "auto";
      }
      const playNext = () => {
        if (index >= words.length) {
          voiceUnlocked = true;
          els.voiceStatus.textContent = "语音已开启";
          return;
        }
        if (index + 1 < words.length) {
          nextFallbackAudio.src = makeUrl(words[index + 1]);
          nextFallbackAudio.load();
        }
        fallbackAudio.pause();
        fallbackAudio.currentTime = 0;
        fallbackAudio.src = makeUrl(words[index]);
        index += 1;
        els.voiceStatus.textContent = "在线语音";
        fallbackAudio.onended = () => setTimeout(playNext, 20);
        fallbackAudio.onerror = () => {
          els.voiceStatus.textContent = "请再点一次";
          fallbackAudio.onended = null;
          fallbackAudio.onerror = null;
        };
        fallbackAudio.play().catch(() => {
          els.voiceStatus.textContent = "请再点一次";
        });
      };
      playNext();
    }

    function playTencentTts(text) {
      if (!ttsAudio) {
        ttsAudio = new Audio();
        ttsAudio.preload = "auto";
      }
      ttsAudio.pause();
      ttsAudio.currentTime = 0;
      ttsAudio.src = `/api/tts?text=${encodeURIComponent(text)}`;
      els.voiceStatus.textContent = "腾讯云语音";
      return ttsAudio.play()
        .then(() => {
          voiceUnlocked = true;
          els.voiceStatus.textContent = "语音已开启";
          return true;
        })
        .catch(() => false);
    }

    async function speak(text, options = {}) {
      if (!options.browserOnly) {
        const played = await playTencentTts(text);
        if (played) return;
      }
      if (options.onlineOnly) {
        playFallbackAudio(text);
        return;
      }
      if (!("speechSynthesis" in window)) {
        playFallbackAudio(text);
        return;
      }
      pickVoice();
      speechSynthesis.resume();
      if (!options.noCancel) {
        speechSynthesis.cancel();
      }
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = selectedVoice?.lang || "en-US";
      if (selectedVoice) {
        utterance.voice = selectedVoice;
      }
      utterance.rate = 0.82;
      utterance.pitch = 1.05;
      utterance.volume = options.quiet ? 0.01 : 1;
      utterance.onstart = () => {
        voiceUnlocked = true;
        els.voiceStatus.textContent = "语音已开启";
      };
      utterance.onend = () => {
        activeUtterance = null;
      };
      utterance.onerror = (event) => {
        activeUtterance = null;
        if (event.error === "interrupted" || event.error === "canceled") {
          els.voiceStatus.textContent = voiceUnlocked ? "语音已开启" : "开启语音";
          return;
        }
        playFallbackAudio(text);
      };
      activeUtterance = utterance;
      speechSynthesis.speak(utterance);
    }

    function unlockVoice() {
      voiceUnlocked = true;
      speak(currentItem.word, { onlineOnly: true });
    }

    function renderTabs() {
      els.themeTabs.innerHTML = themes.map((theme, index) => `
        <button class="theme-tab ${index === currentThemeIndex ? "active" : ""}" type="button" data-theme="${index}">
          <span class="tab-num">${String(index + 1).padStart(2, "0")}</span>
          <span class="tab-title">${theme.title}<small>${theme.subtitle}</small></span>
        </button>
      `).join("");
    }

    async function drawThumb(canvas, theme, item) {
      const img = await loadImage(theme.image);
      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      const width = Math.max(220, Math.round(rect.width * dpr));
      const height = Math.max(130, Math.round(rect.height * dpr));
      canvas.width = width;
      canvas.height = height;
      const sourceCrop = item.cropRect || {
        x: crop.x + item.cropCol * (crop.w / 4),
        y: crop.y + item.cropRow * (crop.h / 4),
        w: crop.w / 4,
        h: crop.h / 4
      };
      const sx = sourceCrop.x;
      const sy = sourceCrop.y;
      const sw = sourceCrop.w;
      const sh = sourceCrop.h;
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, width, height);
    }

    function selectItem(item, card) {
      currentItem = item;
      els.currentWord.textContent = item.word;
      els.currentCn.textContent = item.cn;
      document.querySelectorAll(".word-card.speaking").forEach((node) => node.classList.remove("speaking"));
      if (card) {
        card.classList.add("speaking");
        setTimeout(() => card.classList.remove("speaking"), 520);
      }
      api("/api/progress/word", {
        method: "POST",
        body: JSON.stringify({ themeId: themes[currentThemeIndex].id, word: item.word })
      }).catch(() => {});
      speak(item.word);
    }

    function renderCards() {
      const theme = themes[currentThemeIndex];
      els.cards.innerHTML = theme.items.map((item, index) => `
        <button class="word-card" type="button" data-word="${index}">
          <span class="thumb"><canvas aria-hidden="true"></canvas></span>
          <span class="word-meta"><b class="${item.word.length > 16 ? "long-word" : ""}">${item.word}</b><span>${item.cn}</span></span>
        </button>
      `).join("");
      els.cards.querySelectorAll(".word-card").forEach((card) => {
        const item = theme.items[Number(card.dataset.word)];
        card.addEventListener("click", () => selectItem(item, card));
        drawThumb(card.querySelector("canvas"), theme, item);
      });
    }

    function shuffle(array) {
      return array.map((value) => ({ value, sort: Math.random() })).sort((a, b) => a.sort - b.sort).map(({ value }) => value);
    }

    async function newQuiz() {
      const theme = themes[currentThemeIndex];
      const data = await api("/api/quiz/next", {
        method: "POST",
        body: JSON.stringify({ themeId: theme.id })
      }).catch(() => null);
      if (!data) return;
      quizItem = theme.items.find((item) => item.word === data.word) || theme.items[0];
      const options = data.options || shuffle([quizItem, ...shuffle(theme.items.filter((item) => item.cn !== quizItem.cn)).slice(0, 3)]).map((item) => item.cn);
      els.quizWord.textContent = quizItem.word;
      els.feedback.textContent = "";
      els.answers.innerHTML = options.map((cn) => `
        <button class="answer" type="button" data-cn="${cn}">${cn}</button>
      `).join("");
      els.answers.querySelectorAll(".answer").forEach((button) => {
        button.addEventListener("click", async () => {
          const result = await api("/api/quiz/answer", {
            method: "POST",
            body: JSON.stringify({ themeId: theme.id, word: quizItem.word, selectedCn: button.dataset.cn })
          }).catch((error) => ({ error: error.message }));
          if (result?.error) {
            els.feedback.textContent = result.error;
            return;
          }
          const correct = Boolean(result.correct);
          els.answers.querySelectorAll(".answer").forEach((node) => {
            if (node.dataset.cn === result.correctCn) node.classList.add("correct");
          });
          if (!correct) button.classList.add("wrong");
          els.feedback.textContent = correct ? "答对了！" : `正确答案：${result.correctCn}`;
          speak(quizItem.word);
        }, { once: true });
      });
    }

    function setTheme(index) {
      currentThemeIndex = index;
      const theme = themes[index];
      currentItem = theme.items[0];
      if (els.poster) {
        els.poster.src = theme.image;
        els.poster.alt = theme.title;
      }
      els.themeTitle.textContent = theme.title;
      els.themeSubtitle.textContent = theme.subtitle;
      els.currentWord.textContent = currentItem.word;
      els.currentCn.textContent = currentItem.cn;
      renderTabs();
      renderCards();
      newQuiz();
      setStudyMode("learn");
    }

    els.themeTabs.addEventListener("click", (event) => {
      const button = event.target.closest("[data-theme]");
      if (button) setTheme(Number(button.dataset.theme));
    });

    els.repeatBtn.addEventListener("click", () => speak(currentItem.word));
    els.quizBtn.addEventListener("click", newQuiz);
    els.speakQuizBtn.addEventListener("click", () => quizItem && speak(quizItem.word));
    els.voiceStatus.addEventListener("click", unlockVoice);
    els.logoutBtn.addEventListener("click", async () => {
      await api("/api/auth/logout", { method: "POST", body: "{}" }).catch(() => null);
      location.href = "/login";
    });
    els.modeButtons.forEach((button) => {
      button.addEventListener("click", () => setStudyMode(button.dataset.modeButton));
    });
    window.speechSynthesis?.addEventListener?.("voiceschanged", pickVoice);
    window.addEventListener("resize", () => renderCards());

    initUser();
    setStudyMode("learn");
    pickVoice();
    setTheme(0);
  </script>
