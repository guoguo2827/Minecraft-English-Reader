<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>设置新密码 - Minecraft English Reader</title>
  <link rel="stylesheet" href="/portal.css">
</head>
<body>
  <main class="portal">
    <section class="portal-card">
      <h1>设置新密码</h1>
      <p>请使用管理员给你的临时密码，设置一个新的登录密码。</p>
      <form id="passwordForm">
        <label>临时密码<input name="currentPassword" type="password" autocomplete="current-password" required></label>
        <label>新密码<input name="newPassword" type="password" autocomplete="new-password" minlength="6" required></label>
        <label>确认新密码<input name="confirmPassword" type="password" autocomplete="new-password" minlength="6" required></label>
        <button type="submit">保存新密码</button>
      </form>
      <p class="message" id="message"></p>
      <p class="notice">保存后请使用手机号和新密码登录。</p>
    </section>
  </main>
  <script>
    const form = document.querySelector("#passwordForm");
    const message = document.querySelector("#message");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const body = Object.fromEntries(new FormData(form).entries());
      if (body.newPassword !== body.confirmPassword) {
        message.textContent = "两次输入的新密码不一致";
        return;
      }
      message.textContent = "正在保存...";
      const response = await fetch("/api/auth/change-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        message.textContent = data.error || "保存失败";
        return;
      }
      message.textContent = "新密码已保存，正在进入学习页...";
      location.href = "/";
    });
  </script>
</body>
</html>
