<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>注册 - Minecraft English Reader</title>
  <link rel="stylesheet" href="/portal.css">
</head>
<body>
  <main class="portal">
    <section class="portal-card">
      <h1>邀请码注册</h1>
      <p>请使用管理员提供的手机号和 6 位邀请码</p>
      <form id="registerForm">
        <label>手机号<input name="phone" inputmode="numeric" autocomplete="tel" required></label>
        <label>邀请码<input name="inviteCode" maxlength="6" autocomplete="one-time-code" required></label>
        <label>用户名<input name="username" autocomplete="username" required></label>
        <label>密码<input name="password" type="password" autocomplete="new-password" minlength="6" required></label>
        <button type="submit">注册并登录</button>
      </form>
      <p class="portal-link">已有账号？<a href="/login">去登录</a></p>
      <p class="message" id="message"></p>
      <p class="notice">邀请码注册成功后会立即失效，不能重复使用。</p>
    </section>
  </main>
  <script>
    const form = document.querySelector("#registerForm");
    const message = document.querySelector("#message");
    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      message.textContent = "正在注册...";
      const body = Object.fromEntries(new FormData(form).entries());
      const response = await fetch("/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        message.textContent = data.error || "注册失败";
        return;
      }
      location.href = "/";
    });
  </script>
</body>
</html>
